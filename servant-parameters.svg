<svg width="724" height="196" viewBox="0 0 724 196" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .pixel {
        font-family: "Lucida Console", "Courier New", monospace;
        letter-spacing: 0.5px;
        shape-rendering: crispEdges;
        text-rendering: geometricPrecision;
      }
      .frame {
        fill: #161b22;
        stroke: #30363d;
        stroke-width: 1.5;
      }
      .panel {
        fill: #0d1117;
        stroke: #30363d;
        stroke-width: 1.2;
      }
      .label {
        font-size: 18px;
        font-weight: bold;
        fill: #c9d1d9;
      }
      .value {
        font-size: 18px;
        font-weight: bold;
        fill: #c9d1d9;
      }
      .track {
        fill: #21262d;
        stroke: #30363d;
        stroke-width: 1;
      }
      .seg-on {
        fill: #ff8f1f;
      }
      .seg-off {
        fill: #30363d;
      }
      .gap {
        fill: #0d1117;
      }
    </style>
  </defs>

  <!-- outer frame -->
  <rect x="1" y="1" width="722" height="194" rx="10" class="frame"/>

  <!-- inner panels -->
  <rect x="16" y="18" width="330" height="160" rx="8" class="panel"/>
  <rect x="378" y="18" width="330" height="160" rx="8" class="panel"/>

  <!-- left panel -->
  <text x="42" y="46" class="pixel label">STRENGTH</text>
