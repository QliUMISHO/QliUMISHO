    <rect x="356" y="206" width="584" height="54" rx="16" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.07"/>
    <rect x="376" y="220" width="56" height="24" rx="12" fill="#ff7b72" fill-opacity="0.16" stroke="#ff7b72" stroke-opacity="0.55"/>
    <text x="404" y="236" fill="#ff7b72" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="11" text-anchor="middle" font-weight="700">NET</text>
