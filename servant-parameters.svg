<svg width="724" height="156" viewBox="0 0 724 156" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .pixel {
        font-family: "Lucida Console", monospace;
        letter-spacing: 0.5px;
        shape-rendering: crispEdges;
      }
      .label {
        font-size: 18px;
        font-weight: bold;
        fill: #2f2f2f;
      }
      .value {
        font-size: 18px;
        font-weight: bold;
        fill: #1f1f1f;
      }
      .track {
        fill: #2f3440;
      }
      .seg {
        fill: #ff7a00;
      }
      .seg-dark {
        fill: #cc5f00;
      }
    </style>
  </defs>

  <!-- box -->
  <rect x="0" y="0" width="724" height="156" fill="#e8e8d0" stroke="#2b2b2b" stroke-width="2"/>

  <!-- ================= ROW 1 ================= -->
  <text x="22" y="28" class="pixel label">STRENGTH</text>
  <text x="242" y="28" text-anchor="end" class="pixel value">EX--</text>

  <!-- segmented bar left -->
  <rect x="22" y="34" width="220" height="10" class="track"/>
  <rect x="22" y="34" width="42" height="10" class="seg"/>
  <rect x="67" y="34" width="42" height="10" class="seg"/>
  <rect x="112" y="34" width="42" height="10" class="seg"/>
  <rect x="157" y="34" width="42" height="10" class="track"/>
  <rect x="202" y="34" width="40" height="10" class="track"/>

  <text x="362" y="28" class="pixel label">ENDURANCE</text>
  <text x="632" y="28" text-anchor="end" class="pixel value">EX--</text>

  <!-- segmented bar right -->
  <rect x="362" y="34" width="270" height="10" class="track"/>
  <rect x="362" y="34" width="50" height="10" class="seg"/>
  <rect x="416" y="34" width="50" height="10" class="seg"/>
  <rect x="470" y="34" width="50" height="10" class="seg"/>
  <rect x="524" y="34" width="50" height="10" class="track"/>
  <rect x="578" y="34" width="54" height="10" class="track"/>

  <!-- ================= ROW 2 ================= -->
  <text x="22" y="72" class="pixel label">AGILITY</text>
  <text x="242" y="72" text-anchor="end" class="pixel value">EX--</text>

  <rect x="22" y="78" width="220" height="10" class="track"/>
  <rect x="22" y="78" width="42" height="10" class="seg"/>
  <rect x="67" y="78" width="42" height="10" class="seg"/>
  <rect x="112" y="78" width="42" height="10" class="seg"/>
  <rect x="157" y="78" width="42" height="10" class="track"/>
  <rect x="202" y="78" width="40" height="10" class="track"/>

  <text x="362" y="72" class="pixel label">MANA</text>
  <text x="632" y="72" text-anchor="end" class="pixel value">EX---</text>

  <rect x="362" y="78" width="270" height="10" class="track"/>
  <rect x="362" y="78" width="50" height="10" class="seg"/>
  <rect x="416" y="78" width="50" height="10" class="seg"/>
  <rect x="470" y="78" width="50" height="10" class="track"/>
  <rect x="524" y="78" width="50" height="10" class="track"/>
  <rect x="578" y="78" width="54" height="10" class="track"/>

  <!-- ================= ROW 3 ================= -->
  <text x="22" y="116" class="pixel label">LUCK</text>
  <text x="242" y="116" text-anchor="end" class="pixel value">EX-</text>

  <rect x="22" y="122" width="220" height="10" class="track"/>
  <rect x="22" y="122" width="42" height="10" class="seg"/>
  <rect x="67" y="122" width="42" height="10" class="seg"/>
  <rect x="112" y="122" width="42" height="10" class="seg"/>
  <rect x="157" y="122" width="42" height="10" class="seg"/>
  <rect x="202" y="122" width="40" height="10" class="track"/>

  <text x="362" y="116" class="pixel label">NP</text>
  <text x="632" y="116" text-anchor="end" class="pixel value">EX--</text>

  <rect x="362" y="122" width="270" height="10" class="track"/>
  <rect x="362" y="122" width="50" height="10" class="seg"/>
  <rect x="416" y="122" width="50" height="10" class="seg"/>
  <rect x="470" y="122" width="50" height="10" class="seg"/>
  <rect x="524" y="122" width="50" height="10" class="track"/>
  <rect x="578" y="122" width="54" height="10" class="track"/>
</svg>
