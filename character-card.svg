<svg width="724" height="220" viewBox="0 0 724 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .pixel {
        font-family: "Lucida Console", monospace;
        letter-spacing: 0.5px;
        shape-rendering: crispEdges;
      }
      .label {
        font-size: 18px;
        font-weight: bold;
        fill: #2f2f2f;
      }
      .value {
        font-size: 18px;
        font-weight: bold;
        fill: #1f1f1f;
      }
      .track {
        fill: #2f3440;
      }
      .bar {
        fill: #6f5db7;
      }
    </style>
  </defs>

  <rect x="0" y="0" width="724" height="220" fill="#e8e8d0" stroke="#2b2b2b" stroke-width="2"/>

  <!-- Row 1 -->
  <text x="22"  y="34" class="pixel label">ATTACK</text>
  <text x="242" y="34" class="pixel value">10 (-989)</text>
  <rect x="22" y="42" width="220" height="8" rx="4" class="track"/>
  <rect x="22" y="42" width="2" height="8" rx="4" class="bar"/>

  <text x="362" y="34" class="pixel label">INSANITY</text>
  <text x="632" y="34" class="pixel value">999</text>
  <rect x="362" y="42" width="270" height="8" rx="4" class="track"/>
  <rect x="362" y="42" width="3" height="8" rx="4" class="bar"/>

  <!-- Row 2 -->
  <text x="22"  y="82" class="pixel label">MENTAL</text>
  <text x="242" y="82" class="pixel value">182 (-817)</text>
  <rect x="22" y="90" width="220" height="8" rx="4" class="track"/>
  <rect x="22" y="90" width="3" height="8" rx="4" class="bar"/>

  <text x="362" y="82" class="pixel label">LUCK</text>
  <text x="632" y="82" class="pixel value">73 (-926)</text>
  <rect x="362" y="90" width="270" height="8" rx="4" class="track"/>
  <rect x="362" y="90" width="3" height="8" rx="4" class="bar"/>

  <!-- Row 3 -->
  <text x="22"  y="130" class="pixel label">EXP. POINTS</text>
  <text x="242" y="130" class="pixel value">9732</text>
  <rect x="22" y="138" width="220" height="8" rx="4" class="track"/>
  <rect x="22" y="138" width="2" height="8" rx="4" class="bar"/>

  <text x="362" y="130" class="pixel label">NEXT LV.</text>
  <text x="632" y="130" class="pixel value">990267</text>
  <rect x="362" y="138" width="270" height="8" rx="4" class="track"/>
  <rect x="362" y="138" width="267" height="8" rx="4" class="bar"/>
</svg>
