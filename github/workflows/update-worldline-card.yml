name: Update Worldline Card

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: worldline-card
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate SVG and JSON snapshot
        run: node scripts/generate-worldline-card.mjs

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- assets/worldline-card.svg data/worldline.json; then
            echo "No changes to commit."
            exit 0
          fi

          git add assets/worldline-card.svg data/worldline.json
          git commit -m "chore: update worldline card"
          git push
