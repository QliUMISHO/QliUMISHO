  <rect x="42" y="58" width="186" height="10" class="track"/>
  <rect x="42"  y="58" width="32" height="10" class="seg-on"/>
  <rect x="79"  y="58" width="32" height="10" class="seg-on"/>
  <rect x="116" y="58" width="32" height="10" class="seg-on"/>
  <rect x="153" y="58" width="32" height="10" class="seg-off"/>
  <rect x="190" y="58" width="32" height="10" class="seg-off"/>
  <rect x="74" y="58" width="5" height="10" class="gap"/>
  <rect x="111" y="58" width="5" height="10" class="gap"/>
  <rect x="148" y="58" width="5" height="10" class="gap"/>
  <rect x="185" y="58" width="5" height="10" class="gap"/>

