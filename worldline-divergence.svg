<svg width="724" height="148" viewBox="0 0 724 148" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .pixel {
        font-family: "Lucida Console", "Courier New", monospace;
        letter-spacing: 0.5px;
        shape-rendering: crispEdges;
        text-rendering: geometricPrecision;
      }
      .frame {
        fill: #161b22;
        stroke: #30363d;
        stroke-width: 1.5;
      }
      .panel {
        fill: #0d1117;
        stroke: #30363d;
        stroke-width: 1.2;
      }
      .title {
        font-size: 18px;
        font-weight: bold;
        fill: #c9d1d9;
      }
      .muted {
        font-size: 13px;
        font-weight: bold;
        fill: #8b949e;
      }
      .value {
        font-size: 34px;
        font-weight: bold;
        fill: #58a6ff;
      }
      .chip {
        fill: #161b22;
        stroke: #30363d;
        stroke-width: 1;
      }
      .chip-text {
        font-size: 12px;
        font-weight: bold;
        fill: #c9d1d9;
      }
      .accent {
        fill: #58a6ff;
      }
    </style>
  </defs>

  <rect x="1" y="1" width="722" height="146" rx="10" class="frame"/>
  <rect x="16" y="16" width="692" height="116" rx="8" class="panel"/>

  <text x="32" y="40" class="pixel title">WORLDLINE DIVERGENCE</text>
  <rect x="32" y="50" width="660" height="3" rx="1.5" class="accent"/>

  <text x="32" y="74" class="pixel muted">CURRENT VALUE</text>
  <text x="32" y="114" class="pixel value">1.938454</text>

  <rect x="544" y="76" width="148" height="24" rx="6" class="chip"/>
  <text x="618" y="92" text-anchor="middle" class="pixel chip-text">STEINS;GATE</text>

  <text x="32" y="126" class="pixel muted">LAST UPDATE PENDING ACTION RUN</text>
</svg>
