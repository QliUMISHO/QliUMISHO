<svg width="724" height="156" viewBox="0 0 724 156" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .pixel {
        font-family: "Lucida Console", "Courier New", monospace;
        letter-spacing: 0.5px;
        shape-rendering: crispEdges;
        text-rendering: geometricPrecision;
      }
      .frame {
        fill: #161b22;
        stroke: #30363d;
        stroke-width: 1.5;
      }
      .panel {
        fill: #0d1117;
        stroke: #30363d;
        stroke-width: 1.2;
      }
      .title {
        font-size: 18px;
        font-weight: bold;
        fill: #c9d1d9;
      }
      .muted {
        font-size: 13px;
        font-weight: bold;
        fill: #8b949e;
      }
      .value {
        font-size: 36px;
        font-weight: bold;
        fill: #58a6ff;
      }
      .accent {
        fill: #58a6ff;
      }
      .chip {
        fill: #161b22;
        stroke: #30363d;
        stroke-width: 1;
      }
      .chip-text {
        font-size: 12px;
        font-weight: bold;
        fill: #c9d1d9;
      }
    </style>
  </defs>

  <rect x="1" y="1" width="722" height="154" rx="10" class="frame"/>
  <rect x="16" y="16" width="692" height="124" rx="8" class="panel"/>

  <text x="32" y="40" class="pixel title">WORLDLINE DIVERGENCE</text>
  <rect x="32" y="48" width="660" height="3" rx="1.5" class="accent"/>

  <text x="32" y="76" class="pixel muted">CURRENT VALUE</text>
  <text x="32" y="118" class="pixel value">1.765327</text>

  <rect x="534" y="70" width="158" height="28" rx="6" class="chip"/>
  <text x="613" y="88" text-anchor="middle" class="pixel chip-text">STEINS;GATE</text>

  <text x="32" y="132" class="pixel muted">LAST UPDATE 2026-03-19 22:52 UTC</text>
</svg>
