name: Update Worldline

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-worldline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate worldline SVG assets
        run: python scripts/update_worldline.py

      - name: Commit updated SVGs
        run: |
          if git diff --quiet -- worldline-divergence.svg worldline-news.svg; then
            echo "No SVG changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worldline-divergence.svg worldline-news.svg
          git commit -m "Update worldline assets"
          git push
