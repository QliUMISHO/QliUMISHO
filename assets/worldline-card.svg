    <rect x="376" y="284" width="56" height="24" rx="12" fill="#79c0ff" fill-opacity="0.16" stroke="#79c0ff" stroke-opacity="0.55"/>
    <text x="404" y="300" fill="#79c0ff" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="11" text-anchor="middle" font-weight="700">SYNC</text>
    <text x="450" y="300" fill="#f0f6fc" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="13" font-weight="700">Impact 0.000</text>
